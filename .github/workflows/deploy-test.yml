# Secret-gated deploy to the TEST environment.
#
# Required secrets (repo Settings -> Secrets and variables -> Actions):
#   KUBE_CONFIG_TEST  base64-encoded kubeconfig with access to the `fiducia-test`
#                     namespace. When absent, this workflow is a no-op
#                     (validation-only) -- nothing is deployed.
#
# Topology: app repos deploy to the TEST environment from their own CI; the
# fiducia-monorepo is the only PROD deploy. This is the TEST half for this
# service -- it rolls the `fiducia-test` namespace deployment to the image
# tagged with this commit SHA (ghcr.io/fiducia-cloud/fiducia-routing:<sha>),
# built/pushed by docker.yml.
name: deploy-test

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: deploy to test
        env:
          KUBE_CONFIG_TEST: ${{ secrets.KUBE_CONFIG_TEST }}
        run: |
          if [ -z "$KUBE_CONFIG_TEST" ]; then echo "no KUBE_CONFIG_TEST secret — skipping test deploy (validation-only)"; exit 0; fi
          echo "$KUBE_CONFIG_TEST" | base64 -d > /tmp/kubeconfig; export KUBECONFIG=/tmp/kubeconfig
          kubectl -n fiducia-test set image deploy/fiducia-routing fiducia-routing=ghcr.io/fiducia-cloud/fiducia-routing:${{ github.sha }} --record || echo "deploy target not found — first-time apply is a manual step"
