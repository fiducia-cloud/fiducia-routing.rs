# Secret-gated deploy to the TEST environment.
#
# Required secrets (repo Settings -> Secrets and variables -> Actions):
#   KUBE_CONFIG_TEST  base64-encoded kubeconfig with access to the `fiducia-test`
#                     namespace. Missing or invalid credentials fail the job.
#
# Topology: app repos deploy to the TEST environment from their own CI; the
# fiducia-monorepo is the only PROD deploy. This is the TEST half for this
# service -- it rolls the `fiducia-test` namespace deployment to the image
# tagged with this commit SHA (ghcr.io/fiducia-cloud/fiducia-routing:<sha>),
# built/pushed by docker.yml.
name: deploy-test

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: deploy to test
        env:
          KUBE_CONFIG_TEST: ${{ secrets.KUBE_CONFIG_TEST }}
        run: |
          set -euo pipefail
          test -n "$KUBE_CONFIG_TEST"
          umask 077
          kubeconfig="${RUNNER_TEMP}/fiducia-test-kubeconfig"
          printf '%s' "$KUBE_CONFIG_TEST" \
            | base64 --decode \
            | install -m 600 /dev/stdin "$kubeconfig"
          export KUBECONFIG="$kubeconfig"
          kubectl -n fiducia-test set image \
            deployment/fiducia-routing \
            fiducia-routing=ghcr.io/fiducia-cloud/fiducia-routing:${{ github.sha }}
          kubectl -n fiducia-test rollout status deployment/fiducia-routing --timeout=5m
