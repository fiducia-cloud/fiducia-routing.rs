# Builds and pushes the fiducia-region container image to ghcr.io (latest + commit
# SHA tags) on every push to main.
name: docker
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/fiducia-cloud/fiducia-routing:latest
            ghcr.io/fiducia-cloud/fiducia-routing:${{ github.sha }}
